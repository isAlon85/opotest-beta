<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz JSON</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --surface: #ffffff;
        --surface-2: #eef2f7;
        --text: #172033;
        --muted: #5d6b82;
        --border: #d9e0ea;
        --primary: #1459c7;
        --success-bg: #eaf8ef;
        --success-border: #27a35f;
        --success-text: #16623a;
        --error-bg: #fff0f0;
        --error-border: #d64545;
        --error-text: #8b1e1e;
        --shadow: 0 10px 28px rgba(18, 31, 53, 0.08);
        --radius: 16px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      body {
        margin: 0;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: linear-gradient(180deg, #f8fbff 0%, #f5f7fb 100%);
        color: var(--text);
        overflow-x: hidden;
      }

      .container {
        width: min(1100px, calc(100% - 32px));
        margin: 0 auto;
        padding: 20px 0 64px;
      }

      .header {
        position: sticky;
        top: 0;
        z-index: 20;
        background: rgba(245, 247, 251, 0.94);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(217, 224, 234, 0.8);
      }

      .header-inner {
        width: min(1100px, calc(100% - 32px));
        margin: 0 auto;
        padding: 12px 0;
        display: flex;
        gap: 16px;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
      }

      .title {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0;
        flex: 1 1 260px;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.2rem, 1rem + 1vw, 1.8rem);
        line-height: 1.15;
      }

      .subtitle {
        color: var(--muted);
        font-size: 0.94rem;
        line-height: 1.4;
      }

      .scoreboard {
        display: grid;
        grid-template-columns: repeat(4, minmax(88px, 1fr));
        gap: 10px;
        width: min(100%, 560px);
        flex: 1 1 420px;
      }

      .stat {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 10px 12px;
        box-shadow: var(--shadow);
        min-width: 0;
      }

      .stat-label {
        display: block;
        color: var(--muted);
        font-size: 0.76rem;
        margin-bottom: 4px;
        line-height: 1.2;
      }

      .stat-value {
        font-size: clamp(1rem, 0.95rem + 0.45vw, 1.2rem);
        font-weight: 700;
        line-height: 1.1;
      }

      .controls {
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
        margin: 18px 0 16px;
        flex-wrap: wrap;
      }

      .pill {
        background: #eaf1ff;
        color: var(--primary);
        border: 1px solid #cdddff;
        border-radius: 999px;
        padding: 8px 14px;
        font-weight: 600;
        font-size: 0.9rem;
        max-width: 100%;
        overflow-wrap: anywhere;
      }

      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .main-btn {
        border: 0;
        border-radius: 999px;
        padding: 11px 18px;
        background: var(--primary);
        color: white;
        font-weight: 700;
        cursor: pointer;
        min-height: 44px;
        white-space: nowrap;
      }

      .main-btn:hover {
        filter: brightness(1.05);
      }

      .question-list {
        display: grid;
        gap: 16px;
      }

      .question-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 18px;
      }

      .question-meta {
        color: var(--muted);
        font-size: 0.88rem;
        margin-bottom: 8px;
        line-height: 1.3;
      }

      .question-text {
        margin: 0 0 14px;
        font-size: clamp(1rem, 0.95rem + 0.45vw, 1.1rem);
        line-height: 1.5;
      }

      .options {
        display: grid;
        gap: 10px;
      }

      .option {
        border: 1px solid var(--border);
        background: var(--surface-2);
        border-radius: 14px;
        padding: 13px 14px;
        text-align: left;
        color: var(--text);
        transition:
          transform 140ms ease,
          border-color 140ms ease,
          background 140ms ease;
        width: 100%;
        min-height: 52px;
        display: flex;
        align-items: center;
      }

      .option-text {
        font-size: 0.98rem;
        line-height: 1.45;
      }

      .option:hover:not(:disabled) {
        transform: translateY(-1px);
      }
      .option:disabled {
        cursor: default;
        opacity: 1;
      }

      .option.correct {
        background: var(--success-bg);
        border-color: var(--success-border);
        color: var(--success-text);
      }

      .option.incorrect {
        background: var(--error-bg);
        border-color: var(--error-border);
        color: var(--error-text);
      }

      .option.reveal-correct {
        border-width: 2px;
      }

      .feedback {
        margin-top: 12px;
        padding: 10px 12px;
        border-radius: 12px;
        font-weight: 700;
        display: none;
        font-size: 0.95rem;
      }

      .feedback.correct {
        display: block;
        background: var(--success-bg);
        color: var(--success-text);
        border: 1px solid var(--success-border);
      }

      .feedback.incorrect {
        display: block;
        background: var(--error-bg);
        color: var(--error-text);
        border: 1px solid var(--error-border);
      }

      .inline-explanation {
        display: none;
        margin-top: 6px;
        padding: 0 4px 0 6px;
        font-size: 0.84rem;
        line-height: 1.4;
        color: var(--muted);
      }

      .inline-explanation.visible {
        display: block;
      }

      .inline-explanation.correct {
        color: var(--success-text);
      }

      .inline-explanation.incorrect {
        color: var(--error-text);
      }

      .option-block {
        display: block;
      }

      .empty,
      .error {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 20px;
        line-height: 1.5;
      }

      .error {
        border-color: var(--error-border);
        background: #fff7f7;
      }

      @media (max-width: 760px) {
        .container,
        .header-inner {
          width: min(100% - 24px, 1100px);
        }

        .header-inner {
          align-items: stretch;
        }

        .scoreboard {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          width: 100%;
        }

        .controls {
          align-items: stretch;
        }

        .pill,
        .actions,
        .actions .main-btn {
          width: 100%;
        }

        .actions {
          display: grid;
          grid-template-columns: 1fr;
        }

        .question-card {
          padding: 16px;
          border-radius: 14px;
        }

        .option {
          padding: 12px;
          min-height: 50px;
        }
      }

      @media (max-width: 420px) {
        .container,
        .header-inner {
          width: calc(100% - 18px);
        }

        .container {
          padding-top: 16px;
          padding-bottom: 40px;
        }

        h1 {
          font-size: 1.12rem;
        }

        .subtitle {
          font-size: 0.86rem;
        }

        .stat {
          padding: 10px;
        }

        .stat-label {
          font-size: 0.72rem;
        }

        .stat-value {
          font-size: 0.98rem;
        }

        .pill {
          border-radius: 16px;
          font-size: 0.84rem;
          padding: 9px 12px;
        }

        .main-btn {
          padding: 12px 14px;
          font-size: 0.95rem;
        }

        .question-meta {
          font-size: 0.8rem;
        }

        .question-text {
          font-size: 0.98rem;
        }

        .option-text {
          font-size: 0.94rem;
        }

        .inline-explanation {
          font-size: 0.79rem;
        }
      }
    </style>
  </head>
  <body>
    <header class="header">
      <div class="header-inner">
        <div class="title">
          <h1>Quiz desde JSON</h1>
          <span class="subtitle"
            >Carga un fichero con muchas preguntas y muestra 50
            aleatorias.</span
          >
        </div>
        <div class="scoreboard" aria-live="polite">
          <div class="stat">
            <span class="stat-label">Preguntas</span
            ><span class="stat-value" id="totalCount">0</span>
          </div>
          <div class="stat">
            <span class="stat-label">Respondidas</span
            ><span class="stat-value" id="answeredCount">0</span>
          </div>
          <div class="stat">
            <span class="stat-label">Correctas</span
            ><span class="stat-value" id="correctCount">0</span>
          </div>
          <div class="stat">
            <span class="stat-label">Puntuación</span
            ><span class="stat-value" id="scorePercent">0%</span>
          </div>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="controls">
        <div class="pill" id="datasetInfo">Usando questions.json</div>
        <div class="actions">
          <input
            id="fileInput"
            type="file"
            accept="application/json"
            style="display: none"
          />
          <button class="main-btn" id="uploadBtn" type="button">
            Cargar JSON
          </button>
          <button class="main-btn" id="reloadBtn" type="button">
            Sacar otras 50
          </button>
        </div>
      </section>

      <section id="app"></section>
    </main>

    <script>
      const QUESTIONS_PER_ROUND = 50;
      const app = document.getElementById("app");
      const fileInput = document.getElementById("fileInput");
      const uploadBtn = document.getElementById("uploadBtn");
      const reloadBtn = document.getElementById("reloadBtn");
      const datasetInfo = document.getElementById("datasetInfo");
      const totalCount = document.getElementById("totalCount");
      const answeredCount = document.getElementById("answeredCount");
      const correctCount = document.getElementById("correctCount");
      const scorePercent = document.getElementById("scorePercent");

      let allQuestions = [];
      let currentQuestions = [];
      let answersState = [];

      function isValidQuestion(question) {
        if (
          !question ||
          typeof question.pregunta !== "string" ||
          !Array.isArray(question.opciones)
        )
          return false;
        if (question.opciones.length !== 4) return false;
        const validOptions = question.opciones.every(
          (opt) =>
            opt &&
            typeof opt.texto === "string" &&
            typeof opt.es_correcta === "boolean" &&
            typeof opt.explicacion === "string",
        );
        const validCorrectCount = question.opciones.filter(
          (opt) => opt.es_correcta,
        ).length;
        return validOptions && validCorrectCount === 1;
      }

      function shuffle(array) {
        const copy = [...array];
        for (let i = copy.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy;
      }

      function pickQuestions(source) {
        const valid = source.filter(isValidQuestion);
        const picked = shuffle(valid).slice(
          0,
          Math.min(QUESTIONS_PER_ROUND, valid.length),
        );
        return picked.map((q, idx) => ({
          ...q,
          localId: q.id ?? idx + 1,
          opciones: shuffle(q.opciones),
        }));
      }

      function resetRound() {
        currentQuestions = pickQuestions(allQuestions);
        answersState = currentQuestions.map(() => ({
          selectedIndex: null,
          isCorrect: null,
        }));
        render();
        updateScore();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function updateScore() {
        const total = currentQuestions.length;
        const answered = answersState.filter(
          (item) => item.selectedIndex !== null,
        ).length;
        const correct = answersState.filter(
          (item) => item.isCorrect === true,
        ).length;
        const percent =
          answered === 0 ? 0 : Math.round((correct / answered) * 100);
        totalCount.textContent = total;
        answeredCount.textContent = answered;
        correctCount.textContent = correct;
        scorePercent.textContent = percent + "%";
      }

      function createOptionBlock(option, optionIndex, state, questionIndex) {
        const wrap = document.createElement("div");
        wrap.className = "option-block";

        const btn = document.createElement("button");
        btn.className = "option";
        btn.type = "button";
        btn.innerHTML = `<span class="option-text">${option.texto}</span>`;

        // Estado después de responder
        if (state.selectedIndex !== null) {
          btn.disabled = true;

          const isSelected = optionIndex === state.selectedIndex;
          const isCorrect = option.es_correcta;

          // Siempre marcar en verde la correcta
          if (isCorrect) {
            btn.classList.add("correct");
          }

          // Si el usuario eligió una incorrecta, marcarla en rojo
          if (isSelected && !isCorrect) {
            btn.classList.add("incorrect");
          }
        }

        btn.addEventListener("click", () => {
          // No dejar responder dos veces
          if (answersState[questionIndex].selectedIndex !== null) return;

          answersState[questionIndex] = {
            selectedIndex: optionIndex,
            isCorrect: option.es_correcta,
          };
          render();
          updateScore();
        });

        const explanation = document.createElement("div");
        explanation.className = `inline-explanation ${option.es_correcta ? "correct" : "incorrect"}`;

        if (state.selectedIndex !== null) {
          explanation.classList.add("visible");
          explanation.textContent = option.explicacion;
        }

        wrap.append(btn, explanation);
        return wrap;
      }

      function render() {
        if (!currentQuestions.length) {
          app.innerHTML =
            '<div class="empty">No hay preguntas válidas para mostrar. El JSON debe ser un array y cada pregunta debe tener 4 opciones con una sola correcta.</div>';
          return;
        }

        const list = document.createElement("div");
        list.className = "question-list";

        currentQuestions.forEach((question, questionIndex) => {
          const state = answersState[questionIndex];
          const card = document.createElement("article");
          card.className = "question-card";

          const meta = document.createElement("div");
          meta.className = "question-meta";
          meta.textContent = `Pregunta ${questionIndex + 1} · ID ${question.localId}`;

          const title = document.createElement("h2");
          title.className = "question-text";
          title.textContent = question.pregunta;

          const options = document.createElement("div");
          options.className = "options";

          question.opciones.forEach((option, optionIndex) => {
            options.appendChild(
              createOptionBlock(option, optionIndex, state, questionIndex),
            );
          });

          // Ojo: ya no hay 'feedback' aquí
          card.append(meta, title, options);
          list.appendChild(card);
        });

        app.innerHTML = "";
        app.appendChild(list);
      }

      async function loadDefaultQuestions() {
        try {
          const response = await fetch("questions.json");
          if (!response.ok) throw new Error("No se pudo leer questions.json");
          const data = await response.json();
          if (!Array.isArray(data))
            throw new Error("El JSON debe ser un array de preguntas");
          allQuestions = data;
          datasetInfo.textContent = `Usando questions.json · ${data.length} preguntas cargadas`;
          resetRound();
        } catch (error) {
          app.innerHTML = `<div class="error">Error al cargar el JSON por defecto: ${error.message}</div>`;
        }
      }

      uploadBtn.addEventListener("click", () => fileInput.click());

      fileInput.addEventListener("change", async (event) => {
        const file = event.target.files?.[0];
        if (!file) return;
        try {
          const text = await file.text();
          const data = JSON.parse(text);
          if (!Array.isArray(data))
            throw new Error("El fichero debe contener un array de preguntas");
          allQuestions = data;
          datasetInfo.textContent = `Fichero cargado: ${file.name} · ${data.length} preguntas`;
          resetRound();
        } catch (error) {
          app.innerHTML = `<div class="error">No se pudo leer el fichero: ${error.message}</div>`;
        } finally {
          fileInput.value = "";
        }
      });

      reloadBtn.addEventListener("click", () => {
        if (!allQuestions.length) return;
        resetRound();
      });

      loadDefaultQuestions();
    </script>
  </body>
</html>
